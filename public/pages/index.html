<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Matcher</title>

    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="styles/auth.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <header>
    </header>
    главная страница
    <div id="authOverlay" style="display: none;">
        <form id="authForm" class="container">
            <h2 id="formTitle">Вход</h2>
            <div class="error" id="authError" style="display: none;"></div>
            <div class="input-wrapper">
                <input type="email" id="email" placeholder="Email">
            </div>
            <div class="input-wrapper" id="usernameWrapper"  style="display:none">
                <input type="text" id="username" placeholder="Имя">
            </div>
            <div class="input-wrapper">
                <input type="password" id="password" placeholder="Пароль">
            </div>
            <div class="input-wrapper" id="confirmPasswordWrapper"  style="display:none">
                <input type="password" id="confirmPassword" placeholder="Подтвердите пароль">
            </div>
            <button id="switchAuthBtn">Нет аккаунта? Зарегистрироваться</button>
            <div class="submit-cancel-wrapper">
                <button type="submit" class="submit-button" id="submitAuthBtn">Войти</button>
                <button type="reset" class="cancel-button" id="cancelAuthBtn">Отмена</button>
            </div>
        </form>
    </div>
    <main>

    </main>

    <footer>
    </footer>
</body>

<script type="module" src="scripts/script.js"></script>

</html>
