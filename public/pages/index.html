<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Matcher</title>

    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="styles/auth.css">
    <link rel="stylesheet" href="styles/header.css">
    <link rel="stylesheet" href="styles/calendar.css">
    <link rel="stylesheet" href="styles/calendar-popups.css">
    <link rel="stylesheet" href="styles/meeting-modal.css">
    <link rel="stylesheet" href="styles/user-groups-block.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <header id="pageHeader"></header>


    <div id="authOverlay" style="display: none;">
        <form id="authForm" class="container">
            <h2 id="formTitle">Вход</h2>
            <div class="error" id="authError" style="display: none;"></div>
            <div class="input-wrapper">
                <input type="email" id="email" placeholder="Email">
            </div>
            <div class="input-wrapper" id="usernameWrapper"  style="display:none">
                <input type="text" id="username" placeholder="Имя">
            </div>
            <div class="input-wrapper">
                <input type="password" id="password" placeholder="Пароль">
            </div>
            <div class="input-wrapper" id="confirmPasswordWrapper"  style="display:none">
                <input type="password" id="confirmPassword" placeholder="Подтвердите пароль">
            </div>
            <button id="switchAuthBtn">Нет аккаунта? Зарегистрироваться</button>
            <div class="submit-cancel-wrapper">
                <button type="submit" class="submit-button" id="submitAuthBtn">Войти</button>
                <button type="reset" class="cancel-button" id="cancelAuthBtn">Отмена</button>
            </div>
        </form>
    </div>

    <div class="page-shell">
        <main class="page-main">
            <aside class="calendar-sidebar">
                <div class="mini-calendar-box" id="miniCalendarBox"></div>

                <div class="create-dropdown" id="createDropdown">
                    <button class="add-btn" id="addBtn">Создать <span class="add-caret">&#9662;</span></button>
                    <div class="create-menu" id="createMenu">
                        <button class="create-item" id="actionEvent">мероприятие</button>
                        <button class="create-item" id="actionMeeting" type="button">встреча</button>
                        <button class="create-item" type="button" disabled>группа</button>
                    </div>
                </div>
            </aside>

            <!-- Календарь -->
            <div class="cal-root" id="calRoot">
                <div class="cal-header">
                    <span class="app-title">Календарь</span>
                    <button class="nav-btn" id="prevBtn">&#8249;</button>
                    <button class="nav-btn" id="nextBtn">&#8250;</button>
                    <span class="week-label" id="weekLabel"></span>
                    <button class="today-btn" id="todayBtn">Сегодня</button>
                </div>
                <div class="col-head" id="colHead">
                    <div class="th-time"></div>
                </div>
                <div class="cal-body" id="calBody">
                    <div class="time-col" id="timeCol"></div>
                    <div class="grid-area" id="gridArea"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Модальное окно создания/редактирования события -->
    <div class="modal-bg" id="modalBg" style="display:none">
        <div class="modal">
            <div class="modal-header">
                <span id="modalTitle">Новое событие</span>
                <button class="modal-close" id="modalClose">&#215;</button>
            </div>
            <div class="modal-body">
                <label>Название</label>
                <input type="text" id="evName" placeholder="Добавить название">
                <label>Дата</label>
                <input type="date" id="evDate">
                <div class="time-row">
                    <div>
                        <label>Начало</label>
                        <input type="time" id="evStart" value="09:00">
                    </div>
                    <div>
                        <label>Конец</label>
                        <input type="time" id="evEnd" value="10:00">
                    </div>
                </div>
                <label>Цвет</label>
                <div class="color-row" id="colorRow"></div>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" id="cancelBtn">Отмена</button>
                <button class="btn-save" id="saveBtn">Сохранить</button>
            </div>
        </div>
    </div>

    <!-- Всплывающая подсказка события -->
    <div class="ev-tooltip" id="evTooltip" style="display:none">
        <div class="tt-title" id="ttTitle"></div>
        <div class="tt-time" id="ttTime"></div>
        <div class="tt-actions">
            <button class="tt-btn tt-edit" id="ttEdit">Изменить</button>
            <button class="tt-btn tt-del" id="ttDel">Удалить</button>
        </div>
    </div>

    <!-- Модальное окно создания встречи -->
    <div class="meeting-modal-bg" id="meetingModalBg" style="display:none">
        <div class="meeting-modal">
            <div class="meeting-modal-title">создание встречи</div>
            <div class="meeting-modal-body">
                <div class="meeting-row">
                    <label for="meetingName">Название:</label>
                    <input id="meetingName" type="text">
                </div>

                <div class="meeting-row">
                    <label for="meetingComment">коментарий:</label>
                    <input id="meetingComment" type="text">
                </div>

                <div class="meeting-row meeting-row-time">
                    <label>Время:</label>
                    <div class="meeting-time-fields">
                        <input id="meetingStart" type="datetime-local">
                        <span>-</span>
                        <input id="meetingEnd" type="datetime-local">
                    </div>
                </div>

                <div class="meeting-row meeting-row-duration">
                    <label>Продолжительность:</label>
                    <input id="meetingDuration" type="time" value="01:00" step="60">
                </div>

                <button type="button" class="meeting-secondary-btn" id="meetingAddParticipantsBtn">Добавить участников</button>
                <button type="button" class="meeting-secondary-btn" id="meetingAddGroupsBtn">Добавить участников из группы</button>
            </div>

            <div class="meeting-modal-footer">
                <button type="button" class="meeting-primary-btn" id="meetingConfirmBtn">Подтвердить</button>
                <button type="button" class="meeting-primary-btn meeting-cancel-btn" id="meetingCancelBtn">Отмена</button>
            </div>
        </div>
    </div>

    <div class="meeting-users-popup-bg" id="meetingUsersPopupBg" style="display:none">
        <div class="meeting-users-popup">
            <div class="meeting-users-popup-header">
                <div class="meeting-users-popup-title">поиск пользователей</div>
                <button type="button" class="meeting-users-popup-close" id="meetingUsersPopupCloseBtn">&times;</button>
            </div>

            <div class="meeting-users-popup-body">
                <label for="meetingUsersSearchInput">Введите имя или email</label>
                <input id="meetingUsersSearchInput" type="search" placeholder="например, ivan или mail@example.com">
                <div class="meeting-users-search-status" id="meetingUsersSearchStatus"></div>

                <div class="meeting-users-section">
                    <div class="meeting-users-section-title">Найденные пользователи</div>
                    <div class="meeting-users-results" id="meetingUsersResults"></div>
                </div>

                <div class="meeting-users-section">
                    <div class="meeting-users-section-title">Выбранные участники</div>
                    <div class="meeting-users-selected" id="meetingUsersSelected"></div>
                </div>
            </div>

            <div class="meeting-users-popup-footer">
                <button type="button" class="meeting-primary-btn meeting-cancel-btn" id="meetingUsersPopupCancelBtn">Закрыть</button>
            </div>
        </div>
    </div>

    <div class="meeting-groups-popup-bg" id="meetingGroupsPopupBg" style="display:none">
        <div class="meeting-groups-popup">
            <div class="meeting-users-popup-header">
                <div class="meeting-users-popup-title">поиск групп</div>
                <button type="button" class="meeting-users-popup-close" id="meetingGroupsPopupCloseBtn">&times;</button>
            </div>

            <div class="meeting-users-popup-body">
                <label for="meetingGroupsSearchInput">Введите название группы или имя участника</label>
                <input id="meetingGroupsSearchInput" type="search" placeholder="например, разработка">
                <div class="meeting-users-search-status" id="meetingGroupsSearchStatus"></div>

                <div class="meeting-users-section">
                    <div class="meeting-users-section-title">Найденные группы</div>
                    <div class="meeting-groups-results" id="meetingGroupsResults"></div>
                </div>

                <div class="meeting-users-section">
                    <div class="meeting-users-section-title">Все группы пользователя</div>
                    <div id="meetingAllGroupsBlock"></div>
                </div>
            </div>

            <div class="meeting-users-popup-footer">
                <button type="button" class="meeting-primary-btn meeting-cancel-btn" id="meetingGroupsPopupCancelBtn">Закрыть</button>
            </div>
        </div>
    </div>

</body>
<script type="module" src="scripts/header.js"></script>
<script type="module" src="scripts/calendar/calendar.js"></script>
<script type="module" src="scripts/script.js"></script>
</html>
