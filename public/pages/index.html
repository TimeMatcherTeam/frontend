<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Matcher</title>

    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="styles/authForm.css">
    <link rel="stylesheet" href="styles/intervalForm.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <header>
    </header>
    главная страница

    <div id="authOverlay" class="form-overlay">
        <form id="authForm" class="container">
            <h2 id="formTitle">Вход</h2>
            <div class="error" id="authError" style="display: none;"></div>
            <div class="big-input-wrapper">
                <input type="email" id="email" placeholder="Email" class="big-input" required>
            </div>
            <div class="big-input-wrapper" id="usernameWrapper"  style="display:none">
                <input type="text" id="username" placeholder="Имя" class="big-input">
            </div>
            <div class="big-input-wrapper password-input">
                <input type="password" id="password" placeholder="Пароль" class="big-input" required>
                <button id="togglePassword" type="button" class="password-eye">
                    <img src="/assets/eye.svg" alt="eye" id="passwordEye">
                </button>
            </div>
            <div class="big-input-wrapper password-input" id="confirmPasswordWrapper"  style="display:none">
                <input type="password" id="confirmPassword" placeholder="Подтвердите пароль" class="big-input">
                <button id="toggleConfirmPassword" type="button" class="password-eye">
                    <img src="/assets/eye.svg" alt="eye" id="confirmPasswordEye">
                </button>
            </div>
            <button id="switchAuthBtn">Нет аккаунта? Зарегистрироваться</button>
            <div class="submit-cancel-wrapper">
                <button type="submit" class="submit-button" id="submitAuthBtn">Войти</button>
                <button type="reset" class="cancel-button" id="cancelAuthBtn">Отмена</button>
            </div>
        </form>
    </div>

    <div id="intervalFormOverlay" class="form-overlay">
        <form action="" id="intervalForm">
            <div class="label-input-container">
                <label for="title">
                    Название
                </label>
                <div class="input-wrapper">
                    <input type="text" id="title">
                </div>
            </div>
            <input type="text" id="comment">
            <input type="time" id="timeStart">
            <input type="time" id="timeEnd">
            <div class="submit-cancel-wrapper">
                <button type="submit" class="submit-button" id="submitIntervalBtn">Подтвердить</button>
                <button type="reset" class="cancel-button" id="cancelIntervalBtn">Отмена</button>
            </div>
        </form>
    </div>
    <main>

    </main>

    <footer>
    </footer>
</body>

<script type="module" src="scripts/script.js"></script>

</html>
